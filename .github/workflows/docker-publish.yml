name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # 推送 tag（如 v1.0.0）时也触发
  workflow_dispatch:   # 允许手动在 Actions 页面触发

env:
  IMAGE_NAME: yunyutong

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 QEMU（跨平台编译支持）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 DockerHub
      #    需要在仓库 Settings → Secrets → Actions 添加：
      #      DOCKERHUB_USERNAME  你的 DockerHub 用户名
      #      DOCKERHUB_TOKEN     DockerHub 的 Access Token（非密码）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. 自动生成镜像标签
      #    - main 分支：推送 latest 标签
      #    - tag（v1.0.0）：推送 1.0.0 和 latest
      #    - 每次构建都附带 sha-xxxxxxx 标签
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # 6. 构建并推送（amd64 + arm64 双平台）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. 输出镜像摘要，方便追溯
      - name: Image digest
        run: echo "Pushed image digest ${{ steps.build-and-push.outputs.digest }}"
